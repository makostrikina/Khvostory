<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>

        Вход

    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Nunito', sans-serif;
        }

        .login-page {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef7ff;
        }

        .login-card {
            width: 400px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: fadeIn 1s ease;
        }

        .pet-image {
            width: 120px;
            display: block;
            margin: 0 auto 20px;
            animation: float 3s ease-in-out infinite;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>

</head>

<body>

    <div class="login-page">

        <div class="login-card">

            <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
                 class="pet-image">

            <h2 class="mb-4 text-center login-title">

                Вход в систему

            </h2>

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Логин

                    </label>

                    <input type="text"
                           name="username"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Пароль

                    </label>

                    <input type="password"
                           name="password"
                           class="form-control">

                </div>

                <button type="submit"
                        class="btn btn-primary w-100">

                    Войти

                </button>

            </form>

        </div>

    </div>

</body>

</html>
