{% extends 'main/base.html' %}

{% block content %}
<h2 class="mb-4">Список услуг</h2>

<form method="get" class="mb-3">

    <div class="row">

        <div class="col-md-6">

            <input type="text"
                   name="q"
                   class="form-control"
                   placeholder="Поиск услуги">

        </div>

        <div class="col-md-2">

            <button type="submit"
                    class="btn btn-primary">
                Поиск
            </button>

        </div>

    </div>

</form>

<a href="/add-service/" class="btn btn-success mb-3">
    Добавить услугу
</a>

<table class="table table-striped table-bordered">
    <tr style="background:#d9f1f1;">
        <th>Название услуги</th>
        <th>Цена</th>
        <th>Управление</th>
    </tr>

    {% for service in services %}
    <tr>
        <td>{{ service.title }}</td>
        <td>{{ service.price }}</td>
        <td>
            <a href="/edit-service/{{ service.id }}/"class="btn btn-warning btn-sm">Редактировать</a> |
            <a href="/delete-service/{{ service.id }}/"class="btn btn-danger btn-sm">Удалить</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">Нет услуг в базе.</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
