{% extends 'main/base.html' %}

{% block content %}
<h2 class="mb-4">Список врачей</h2>

<form method="get" class="mb-3">

    <div class="row">

        <div class="col-md-6">

            <input type="text"
                   name="q"
                   class="form-control"
                   placeholder="Поиск по ФИО или специализации"
                   value="{{ request.GET.q }}">

        </div>

        <div class="col-md-2">

            <button type="submit"
                    class="btn btn-primary">
                Поиск
            </button>

        </div>

    </div>

</form>
<a href="/add-doctor/" class="btn btn-success mb-3">
    Добавить врача
</a>

<table class="table table-striped table-bordered">
    <tr style="background:#d9f1f1;">
        <th>ФИО</th>
        <th>Специализация</th>
        <th>Управление</th>
    </tr>

    {% for doctor in doctors %}
    <tr>
        <td>{{ doctor.full_name }}</td>
        <td>{{ doctor.specialization }}</td>
        <td>
            <a href="/edit-doctor/{{ doctor.id }}/"class="btn btn-warning btn-sm">Редактировать</a> |
            <a href="/delete-doctor/{{ doctor.id }}/"class="btn btn-danger btn-sm">Удалить</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">Нет врачей в базе.</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
